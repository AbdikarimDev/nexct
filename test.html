 
<table
  cellpadding="0"
  cellspacing="0"
  border="0"
  style="
    width: 680px;
    background: #ffffff;
    font-family: Helvetica, Arial, sans-serif;
    color: #120a3d; 
    overflow: hidden;
  "
>
  <tr>
    <td
      style="
        width: 210px;
        vertical-align: middle;
        padding: 26px 20px;
        text-align: center;
      "
    >
      <img
        src="https://yiksi.so/wp-content/uploads/2026/06/logo-taraan-02-2.png"
        width="90"
        height="68"
        alt="Taran Logo"
        style="display: block; margin: 0 auto 12px;"
      />

      <div
        style="
          font-size: 21px;
          font-weight: 600;
          color: #2c0d7f;
          line-height: 1.15;
          margin-bottom: 14px;
        "
      >
        Taran App
      </div>

      <table
        cellpadding="0"
        cellspacing="0"
        border="0"
        style="margin: 0 auto 10px;"
      >
        <tr>
          <td style="padding: 0 3px;">
            <a href="https://facebook.com/yiksi" style="display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: #22c55e; border-radius: 7px; text-decoration: none;">
              <img
                src="https://cdn.simpleicons.org/facebook/FFFFFF"
                width="16"
                height="16"
                alt="Facebook"
                style="display: block;"
              />
            </a>
          </td>
          <td style="padding: 0 3px;">
            <a href="https://instagram.com/yiksi" style="display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: #22c55e; border-radius: 7px; text-decoration: none;">
              <img
                src="https://cdn.simpleicons.org/instagram/FFFFFF"
                width="16"
                height="16"
                alt="Instagram"
                style="display: block;"
              />
            </a>
          </td>
          <td style="padding: 0 3px;">
            <a href="https://x.com/yiksi" style="display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: #22c55e; border-radius: 7px; text-decoration: none;">
              <img
                src="https://cdn.simpleicons.org/x/FFFFFF"
                width="16"
                height="16"
                alt="X"
                style="display: block;"
              />
            </a>
          </td>
          <td style="padding: 0 3px;">
            <a
              href="https://linkedin.com/company/yiksi"
              style="
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 28px;
                height: 28px;
                background: #22c55e;
                border-radius: 7px;
                text-decoration: none;
                color: #ffffff;
                font-size: 13px;
                font-weight: 700;
                font-family: Arial, Helvetica, sans-serif;
              "
            >in</a>
          </td>
        </tr>
      </table>

      <div style="font-size: 13px; font-weight: 400; color: #120a3d;">
        @taran_app
      </div>
    </td>

    <!-- Divider -->
    <td style="width: 1px; padding: 20px 0;">
      <div style="width: 1px; height: 220px; background: #6944D36B; "></div>
    </td>

    <!-- Right: Contact Info -->
    <td style="vertical-align: middle; padding: 32px 28px 32px 32px;">
      <div
        style="
          font-size: 22px;
          font-weight: 700;
          color: #120a3d;
          letter-spacing: -0.01em;
          margin-bottom: 2px;
        "
      >
        ${fullName}
      </div>

      <div
        style="
          font-size: 15px;
          font-weight: 400;
          color: #120a3d;
          margin-bottom: 14px;
          line-height: 1.4;
        "
      >
        ${jobTitle}
        <span style="color: #6b6b8a;"> | </span>
        <span style="font-weight: 700; color: #120a3d;">Taran App</span>
      </div>

      <div
        style="
          width: 50px;
          height: 4px;
          background: #22c55e;
          border-radius: 2px;
          margin-bottom: 22px;
        "
      ></div>

      <!-- Phone -->
      <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom: 14px;">
        <tr>
          <td style="padding-right: 14px; vertical-align: middle;">
            <span style="display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: #22c55e; border-radius: 9px;">
              <img src="https://img.icons8.com/ios-filled/50/ffffff/phone.png" width="14" height="14" alt="Phone" style="display: block;" />
            </span>
          </td>
          <td style="font-size: 15px; color: #120a3d; vertical-align: middle;">
            ${phone}
          </td>
        </tr>
      </table>

      <!-- Email -->
      <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom: 14px;">
        <tr>
          <td style="padding-right: 14px; vertical-align: middle;">
            <span style="display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: #22c55e; border-radius: 9px;">
              <img src="https://img.icons8.com/ios-filled/50/ffffff/new-post.png" width="14" height="14" alt="Email" style="display: block;" />
            </span>
          </td>
          <td style="font-size: 15px; color: #120a3d; vertical-align: middle;">
            ${email}
          </td>
        </tr>
      </table>

      <!-- Website -->
      <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom: 14px;">
        <tr>
          <td style="padding-right: 14px; vertical-align: middle;">
            <span style="display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: #22c55e; border-radius: 9px;">
              <img src="https://img.icons8.com/ios-filled/50/ffffff/domain.png" width="14" height="14" alt="Website" style="display: block;" />
            </span>
          </td>
          <td style="font-size: 15px; color: #120a3d; vertical-align: middle;">
            www.taranapp.com
          </td>
        </tr>
      </table>

      <!-- Location -->
      <table cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td style="padding-right: 14px; vertical-align: middle;">
            <span style="display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: #22c55e; border-radius: 9px;">
              <img src="https://img.icons8.com/ios-filled/50/ffffff/marker.png" width="14" height="14" alt="Location" style="display: block;" />
            </span>
          </td>
          <td style="font-size: 15px; color: #120a3d; vertical-align: middle;">
            ${location}
          </td>
        </tr>
      </table>

    </td>
  </tr>
</table>
